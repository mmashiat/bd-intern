# BD Intern Agent — Company Configuration
# Copy this file to config/company.yaml and fill in your details.
# Run `/bd-intern setup` for an interactive wizard that generates this file.

# ─── REQUIRED ───────────────────────────────────────────────────────────────

company:
  name: "Acme Corp"                        # Your company name
  website: "https://acme.example.com"      # Company website
  description: >
    Acme Corp builds developer tools for distributed systems.
    We help teams ship reliable infrastructure 10x faster.
  industry: "Developer Tools"              # Your industry/vertical
  stage: "Series A"                        # Company stage (pre-seed, seed, Series A/B/C, growth, public)
  team_size: 35                            # Approximate team size

# At least one product is required
products:
  - name: "AcmeDB"
    description: >
      Distributed database with built-in replication and conflict resolution.
      Targets teams running multi-region deployments.
  - name: "AcmeSync"
    description: >
      Real-time data synchronization SDK for mobile and edge applications.

# Target customer profile
target_customers:
  examples:                                # 2-3 real companies that represent your ideal customer
    - "Vercel"
    - "PlanetScale"
    - "Render"
  segments:                                # Auto-derived from examples during setup
    - "Mid-market SaaS companies running multi-region deployments"
    - "Developer platform teams needing real-time data sync"
  description: "Engineering teams at mid-market SaaS companies running multi-region deployments"

typical_deal_size: "$25K/year"             # Helps calibrate outreach tone
sales_cycle: "6-8 weeks"                   # First contact to close

contact:
  email: "partnerships@acme.example.com"   # Primary BD contact email
  name: "Alex Kim"                         # Your name (for signatures)
  role: "Head of Partnerships"             # Your title
  channels:                                # Preferred outreach channels
    - "email"
    - "linkedin"

# ─── OPTIONAL ───────────────────────────────────────────────────────────────

# Brand voice settings — how outreach and content should sound
brand_voice:
  tone: "direct and technical"             # e.g., "friendly and casual", "formal and authoritative"
  personality:
    - "specific over vague"
    - "show don't tell"
    - "lead with value"
  samples_analysis: >                      # Auto-generated from voice samples during setup
    Short sentences. Avoids hedging. Uses "you" more than "we".
    Technical but not academic. Occasional dry humor.
  avoid_words:
    - "synergy"
    - "leverage"
    - "cutting-edge"
    - "revolutionary"
    - "notably"
    - "furthermore"
  prefer_words:
    - "specifically"
    - "concretely"
    - "measurably"
  differentiator: >
    Only distributed database that handles conflict resolution
    at the edge with sub-millisecond latency.

# Tools inventory — what you use and for what
tools:
  - name: "Gmail"
    category: "communication"
    use_case: "Outreach and follow-ups"
    has_mcp: true
  - name: "Linear"
    category: "project_management"
    use_case: "Pipeline tracking and deal management"
    has_mcp: true
  - name: "Google Calendar"
    category: "calendar"
    use_case: "Meeting scheduling"
    has_mcp: false
  - name: "Notion"
    category: "notes"
    use_case: "Internal docs and meeting notes"
    has_mcp: false

# CRM / pipeline settings
crm:
  team_name: "Partnerships"                # Linear team name for BD pipeline
  tool: "linear"                           # CRM tool: "linear", "hubspot", "clay", "airtable", "notion", "google_sheets", "salesforce"

# File paths
paths:
  meeting_notes: "~/.meeting-notes/"       # Where meeting notes/recaps live
  research: "Research/"                    # Where prospect research is saved
  content: "Content/"                      # Where generated content is saved

# Your standard engagement offer (presented at end of outreach/decks)
pipeline:
  engagement_offer:
    name: "Pilot Program"
    description: >
      4-week scoped integration pilot. We handle implementation,
      you provide feedback. Weekly syncs, final demo at week 4.
    duration: "4 weeks"
    cost: "No cost"

# Known competitors (used for competitive intel and positioning)
competitors:
  - name: "RivalCo"
    products: ["RivalDB"]
    notes: "Main competitor in distributed database space"
  - name: "SyncTech"
    products: ["SyncEngine"]
    notes: "Competes on real-time sync, weaker on durability"

# When you lose deals, why? (helps sharpen positioning)
common_loss_reasons:
  - "Price — enterprise procurement pushes for discounts"
  - "Already using RivalCo — switching cost too high"

# Documentation and references
references:
  documentation_links:                     # Links to docs, pitch decks, wikis, etc.
    - "https://docs.acme.example.com"
    - "https://notion.so/acme/pitch-deck"
  # Also drop local files into references/product-knowledge.md for ground truth

# Daily agenda briefing
agenda:
  enabled: true                            # Set to false to disable
  delivery: "slack"                        # "terminal", "slack", "email", or "both"
  slack_user_id: "U0932T672CB"             # Your Slack member ID (for DM delivery)
  time: "8:00 AM"                          # Preferred briefing time

# Intern alias (optional — custom name for your agent)
intern:
  name: ~                                  # e.g., "leo", "scout" — creates /{name} shortcut

# Integrations
integrations:
  slack_channel: "#bd-pipeline"            # Slack channel for pipeline updates

# Sub-agent model (which Claude model sub-agents use)
agents:
  model: "sonnet"                          # "sonnet" (default, fast), "opus" (thorough), "haiku" (quick)
